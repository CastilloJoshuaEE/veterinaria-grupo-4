# Server Configuration
server.port=8080

# SQL Server Configuration - Autenticación Integrada (como en C#)
# Formato: jdbc:sqlserver://NOMBRE_SERVIDOR;databaseName=DB_VidaAnimal;
spring.datasource.url=jdbc:sqlserver://TU_SERVIDOR:1433;databaseName=DB_VidaAnimal;encrypt=true;trustServerCertificate=true;

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.com.mycompany.veterinaria.grupo4=DEBUG