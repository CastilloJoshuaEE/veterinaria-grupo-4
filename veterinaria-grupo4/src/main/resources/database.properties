# ============================================================
# Configuracion de Base de Datos
# ============================================================
# Para cambiar entre SQL Server y MySQL, solo modifique db.type
# Opciones: sqlserver | mysql
# ============================================================

# Tipo de base de datos (sqlserver o mysql)
db.type=sqlserver

# ============================================================
# CONFIGURACION SQL SERVER (para usar, cambiar db.type=sqlserver)
# ============================================================
sqlserver.server=localhost
sqlserver.port=1433
sqlserver.database=db_veterinaria
sqlserver.username=veterinaria_user
sqlserver.password=123456

# ============================================================
# CONFIGURACION MYSQL (para usar, cambiar db.type=mysql)
# ============================================================
mysql.host=localhost
mysql.port=3306
mysql.database=db_veterinaria
mysql.username=veterinaria_user
mysql.password=123456

# ============================================================
# Configuracion general (usuario y password por defecto)
# ============================================================
db.username=veterinaria_user
db.password=123456